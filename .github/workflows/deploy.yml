name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.42.113.132
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            APP_DIR="/opt/bubbletea"

            # ── Clone or pull ──────────────────────────────────
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              apt-get update -y -q
              apt-get install -y -q git python3 python3-pip python3-venv nginx curl
              git clone https://github.com/ehson200611/unipos-systemm.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # ── Node.js ───────────────────────────────────────
            if ! command -v node &>/dev/null || [ "$(node -v | cut -d. -f1 | tr -d v)" -lt 18 ]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash - -q
              apt-get install -y -q nodejs
            fi

            # ── Backend ───────────────────────────────────────
            cd "$APP_DIR/pos-server"
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -r requirements.txt

            cat > .env << 'ENVEOF'
            SECRET_KEY=bubbletea-prod-secret-key-2024-secure
            DEBUG=False
            ALLOWED_HOSTS=5.42.113.132,localhost,127.0.0.1
            DB_ENGINE=sqlite
            CORS_ALLOW_ALL=True
            CORS_ALLOWED_ORIGINS=http://5.42.113.132
            ENVEOF

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            python manage.py shell -c "
            from django.contrib.auth import get_user_model
            U = get_user_model()
            if not U.objects.filter(username='admin').exists():
                u = U.objects.create_superuser('admin', 'admin@bubbletea.tj', 'admin123')
                u.role = 'admin'
                u.save()
            "
            deactivate

            # ── Gunicorn systemd ──────────────────────────────
            cat > /etc/systemd/system/bubbletea.service << SVCEOF
            [Unit]
            Description=Bubble Tea POS Backend
            After=network.target

            [Service]
            WorkingDirectory=$APP_DIR/pos-server
            ExecStart=$APP_DIR/pos-server/.venv/bin/gunicorn config.wsgi:application --bind 127.0.0.1:8000 --workers 3
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable bubbletea
            systemctl restart bubbletea

            # ── Frontend ──────────────────────────────────────
            cd "$APP_DIR/pos-frontend"
            npm install --silent
            npm run build

            # ── Nginx ─────────────────────────────────────────
            cat > /etc/nginx/sites-available/bubbletea << NGINXEOF
            server {
                listen 80;
                server_name 5.42.113.132;

                root $APP_DIR/pos-frontend/dist;
                index index.html;

                location / {
                    try_files \$uri \$uri/ /index.html;
                }

                location /api/ {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                }

                location /admin/ {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host \$host;
                }

                location /static/ {
                    alias $APP_DIR/pos-server/staticfiles/;
                }
            }
            NGINXEOF

            ln -sf /etc/nginx/sites-available/bubbletea /etc/nginx/sites-enabled/bubbletea
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx

            echo "=== DEPLOY COMPLETE === http://5.42.113.132"
