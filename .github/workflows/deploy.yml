name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: pos-frontend
        run: npm ci && npm run build

      - name: Deploy via SSH port 443
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 5.42.113.132
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 443
          timeout: 300s
          script: |
            set -e
            cd /opt/bubbletea

            echo "=== Git pull ==="
            git fetch origin main && git reset --hard origin/main

            echo "=== Backend ==="
            cd pos-server
            source .venv/bin/activate
            pip install -q -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            deactivate

            echo "=== Frontend ==="
            cd /opt/bubbletea/pos-frontend
            npm ci --silent
            npm run build

            echo "=== Restart ==="
            systemctl restart bubbletea nginx
            echo "DEPLOY OK!"
